<!DOCTYPE html>
<html lang="ja">
<head>
<title>testpage</title>
</head>
<body>
<div class="container" style="width:360px;">
<input id="relay-url" type="text" placeholder="wss://r.kojira.io"><button id="subscribe-relay">接続</button>
<label><input type="checkbox" id="newevent-auto-loading" checked>自動更新</label>
</div>
<div id="event-list"></div>
<button type="button" id="load-more">もっと見る</button>
<script>
let relay;
let events = [];
let latestSeen = 0;
let oldestSeen = Infinity;
let autoUpdate = true;
let activeSubscriptions = new Set();
let currentSubId = 'init';

document.getElementById('subscribe-relay').addEventListener('click', () => {
  const url = document.getElementById('relay-url').value || 'wss://r.kojira.io';
  connectToRelay(url);
});

document.getElementById('newevent-auto-loading').addEventListener('change', (e) => {
  autoUpdate = e.target.checked;
  // チェックボックスの状態が変わったら、現在の購読を閉じ、新しい購読を開始する
  if (relay && relay.readyState === WebSocket.OPEN) {
    if (activeSubscriptions.has(currentSubId)) {
      relay.send(JSON.stringify(["CLOSE", currentSubId]));
      activeSubscriptions.delete(currentSubId);
    }
    // タイムラインをリセットして再接続
    events = [];
    document.getElementById('event-list').innerHTML = '';
    latestSeen = 0;
    oldestSeen = Infinity;
    requestNewEvents();
  }
});

document.getElementById('load-more').addEventListener('click', () => {
  const subId = 'older-' + Date.now();
  activeSubscriptions.add(subId);
  const req = ["REQ", subId, { kinds: [1], until: oldestSeen - 1, limit: 10 }];
  if (relay && relay.readyState === WebSocket.OPEN) {
    relay.send(JSON.stringify(req));
  }
});

function connectToRelay(url) {
  if (relay) relay.close();
  relay = new WebSocket(url);

  relay.onopen = () => {
    console.log('接続しました:', url);
    requestNewEvents();
  };

  relay.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    const type = data[0];
    const subId = data[1];

    if (!activeSubscriptions.has(subId)) return;

    if (type === "EVENT") {
      const event = data[2];
      if (event.kind === 1) handleEvent(event);
    }

    if (type === "EOSE") {
      // 'init'または'older'購読の場合は明示的に閉じる
      if (subId === 'init' || subId.startsWith('older-')) {
        relay.send(JSON.stringify(["CLOSE", subId]));
        activeSubscriptions.delete(subId);
      }
    }
  };

  relay.onerror = (err) => console.error('接続エラー:', err);
}

function requestNewEvents() {
  currentSubId = autoUpdate ? 'live' : 'init';
  activeSubscriptions.add(currentSubId);
  
  let filter;
  if (autoUpdate) {
    // 自動更新モード: 継続的な購読
    filter = { kinds: [1] };
    // 最新イベントの取得もこれで兼ねる
  } else {
    // 静的モード: 初回のみ取得
    filter = { kinds: [1], limit: 50 };
  }
  
  const req = ["REQ", currentSubId, filter];
  if (relay && relay.readyState === WebSocket.OPEN) {
    relay.send(JSON.stringify(req));
  }
}

function handleEvent(event) {
  if (events.find(e => e.id === event.id)) return;

  events.push(event);
  latestSeen = Math.max(latestSeen, event.created_at);
  oldestSeen = Math.min(oldestSeen, event.created_at);

  // タイムラインの表示を更新
  renderEvent(event, autoUpdate ? 'prepend' : 'append');
}

function renderEvent(event, mode = 'append') {
  const container = document.getElementById('event-list');
  const div = document.createElement('div');
  div.textContent = `[${new Date(event.created_at * 1000).toLocaleString()}] ${event.content}`;
  div.style.borderBottom = '1px solid #ccc';
  div.style.padding = '4px';

  if (mode === 'prepend') {
    container.insertBefore(div, container.firstChild);
  } else {
    container.appendChild(div);
  }
}
</script>
</body>
</html>
