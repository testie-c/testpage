<!DOCTYPE html>
<html lang="ja">
<head>
<title>testpage</title>
</head>
<body>
<div class="container" style="width:360px;">
<input id="relay-url" type="text" placeholder="wss://r.kojira.io"><button id="subscribe-relay">接続</button>
<label><input type="checkbox" id="newevent-auto-loading" checked>自動更新</label>
</div>
<div id="event-list"></div>
<button type="button" id="load-more">もっと見る</button>
<script src="https://unpkg.com/nostr-tools/lib/nostr.bundle.js"></script>
<script>
let relay;
let events = [];
let latestSeen = 0;
let oldestSeen = Infinity;
let autoUpdate = true;
let activeSubscriptions = new Set();
let currentSubId = 'init';
let profiles = {}; // プロフィールをキャッシュするオブジェクト
let pubkeysToFetch = new Set(); // プロフィールをまだ取得していない公開鍵のセット

document.getElementById('subscribe-relay').addEventListener('click', () => {
  const url = document.getElementById('relay-url').value || 'wss://r.kojira.io';
  connectToRelay(url);
});

document.getElementById('newevent-auto-loading').addEventListener('change', (e) => {
  autoUpdate = e.target.checked;
  if (relay && relay.readyState === WebSocket.OPEN) {
    if (activeSubscriptions.has(currentSubId)) {
      relay.send(JSON.stringify(["CLOSE", currentSubId]));
      activeSubscriptions.delete(currentSubId);
    }
    events = [];
    document.getElementById('event-list').innerHTML = '';
    latestSeen = 0;
    oldestSeen = Infinity;
    requestNewEvents();
  }
});

document.getElementById('load-more').addEventListener('click', () => {
  const subId = 'older-' + Date.now();
  activeSubscriptions.add(subId);
  const req = ["REQ", subId, { kinds: [1], until: oldestSeen - 1, limit: 10 }];
  if (relay && relay.readyState === WebSocket.OPEN) {
    relay.send(JSON.stringify(req));
  }
});

function connectToRelay(url) {
  if (relay) relay.close();
  relay = new WebSocket(url);
  events = [];
  document.getElementById('event-list').innerHTML = '';
  latestSeen = 0;
  oldestSeen = Infinity;
  profiles = {};
  pubkeysToFetch = new Set();

  relay.onopen = () => {
    console.log('接続しました:', url);
    requestNewEvents();
  };

  relay.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      const type = data[0];
      const subId = data[1];

      if (!activeSubscriptions.has(subId)) return;

      if (type === "EVENT") {
        const event = data[2];
        onEvent(event);
      } else if (type === "EOSE") {
        if (subId === 'init' || subId.startsWith('older-')) {
          relay.send(JSON.stringify(["CLOSE", subId]));
          activeSubscriptions.delete(subId);
          fetchProfiles();
        }
      }
    } catch (err) {
      console.error(err);
    }
  };

  relay.onerror = (err) => console.error('接続エラー:', err);
}

function requestNewEvents() {
  currentSubId = autoUpdate ? 'live' : 'init';
  activeSubscriptions.add(currentSubId);
  
  let filter;
  if (autoUpdate) {
    filter = { kinds: [0, 1] }; // kind:0とkind:1を両方取得
  } else {
    filter = { kinds: [0, 1], limit: 50 }; // kind:0とkind:1を両方取得
  }
  
  const req = ["REQ", currentSubId, filter];
  if (relay && relay.readyState === WebSocket.OPEN) {
    relay.send(JSON.stringify(req));
  }
}

function onEvent(event) {
  if (!window.NostrTools.verifyEvent(event)) {
    console.error("nostr event with invalid signature:", event);
    return;
  }
  
  if (event.kind === 0) {
    try {
      profiles[event.pubkey] = JSON.parse(event.content);
      refreshTimeline();
    } catch (e) {
      console.error("Failed to parse profile content:", e);
    }
    return;
  }
  
  if (event.kind !== 1) {
    return;
  }
  
  if (events.find(e => e.id === event.id)) return;
  
  events.push(event);
  latestSeen = Math.max(latestSeen, event.created_at);
  oldestSeen = Math.min(oldestSeen, event.created_at);
  pubkeysToFetch.add(event.pubkey);
  
  refreshTimeline();
}

function refreshTimeline() {
  const container = document.getElementById('event-list');
  container.innerHTML = '';
  
  const sortedEvents = events.sort((a, b) => b.created_at - a.created_at);
  sortedEvents.forEach(e => {
    if (e.kind === 1) {
      const eventView = postEventView(e);
      container.appendChild(eventView);
    }
  });
}

function fetchProfiles() {
  if (pubkeysToFetch.size === 0) return;

  const profileRelayWS = new WebSocket("wss://relay.nostr.band");
  profileRelayWS.onopen = () => {
    const pubkeysArray = Array.from(pubkeysToFetch);
    profileRelayWS.send(JSON.stringify(["REQ", "profile-fetch", { kinds: [0], authors: pubkeysArray }]));
  };

  profileRelayWS.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      const type = data[0];
      if (type === "EVENT" && data[2].kind === 0) {
        const profileEvent = data[2];
        profiles[profileEvent.pubkey] = JSON.parse(profileEvent.content);
        pubkeysToFetch.delete(profileEvent.pubkey);
      }
    } catch (err) {
      console.error(err);
    }
  };

  profileRelayWS.onclose = () => {
    refreshTimeline();
  };
}

// ヘルパー関数群
function formatTimestamp(unixtime) {
  const date = new Date(unixtime * 1000);
  return date.toLocaleTimeString();
}

function pubkeyView(pubkey) {
  const npub = window.NostrTools.nip19.npubEncode(pubkey);
  const displayName = profiles[pubkey] && profiles[pubkey].name ? profiles[pubkey].name : pubkey.substring(0, 8);
  const a = document.createElement("a");
  a.href = "https://nostter.app/" + npub;
  a.target = "_blank";
  a.rel = "noreferrer";
  a.textContent = displayName;
  return a;
}

function metadataView(nostrEv) {
  const view = document.createElement("div");
  view.appendChild(document.createTextNode(`[${formatTimestamp(nostrEv.created_at)}] `));
  view.appendChild(pubkeyView(nostrEv.pubkey));
  view.appendChild(document.createTextNode(" > "));
  return view;
}

function postEventView(nostrEv) {
  const view = document.createElement("div");
  view.style.borderBottom = '1px solid #ccc';
  view.style.padding = '4px';
  view.appendChild(metadataView(nostrEv));
  
  const contentDiv = document.createElement("div");
  contentDiv.textContent = nostrEv.content;
  view.appendChild(contentDiv);
  return view;
}
</script>
</body>
</html>
